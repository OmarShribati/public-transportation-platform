<svg 
    xmlns="http://www.w3.org/2000/svg" 
    viewBox="0 0 200 160" 
    fill="none" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    aria-labelledby="logoTitle"
    role="img"
>
    <title id="logoTitle">Modern Geometric Logo with Gradient</title>
    
    <defs>
        <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:rgb(30, 82, 126);stop-opacity:1" />
            <stop offset="100%" style="stop-color:rgb(34, 106, 153);stop-opacity:1" />
        </linearGradient>
    </defs>

    <path 
        d="M 50 100 
           L 10 60 
           L 10 10 
           L 50 50 
           L 150 50 
           L 190 10 
           L 190 60 
           L 150 100 
           L 100 100 
           L 100 80 
           L 130 80 
           L 160 50 
           L 160 30 
           L 100 30 
           L 100 50 
           L 40 50 
           L 40 80 
           L 70 80 
           L 70 100 Z"
        fill="url(#blueGradient)"
    />
    
    <circle 
        cx="100" 
        cy="140" 
        r="10" 
        fill="rgb(34, 106, 153)" 
    />
</svg>